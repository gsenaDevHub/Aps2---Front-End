<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Aparecida Nutrição</title>
		<link rel="icon" href="favicon.ico" type="image/x-icon">
		<link rel="stylesheet" type="text/css" href="css/reset.css">
		<link rel="stylesheet" type="text/css" href="css/index.css">

	</head>
	<body>
		<header>
			<div class="container">
				<h1>Aparecida Nutrição</h1>
			</div>
		</header>
		<main>
			<a class="voltar-menu" href="../../index.html">Voltar ao menu principal</a>
			<section class="container">
				<h2>Meus pacientes</h2>
				<div class="grupo" style="margin-bottom: 10px;">
					<label for="">Filtrar por Nome:
					</label>
					<input type="text" id="filtrar-tabela" placeholder="Digite o nome do Paciente">
				</div>
				<div style="margin-bottom: 10px">
					<h3>Segure o Shift + Click para excluir linha</h3>
				</div>
				<table>
					<thead>
						<tr>
							<th>Nome</th>
							<th>Peso(kg)</th>
							<th>Altura(m)</th>
							<th>Gordura Corporal(%)</th>
							<th>IMC</th>
						</tr>
					</thead>
					<tbody id="tabela-pacientes">
						<tr class="paciente" style="display: none">
							<td class="info-nome"></td>
							<td class="info-peso"></td>
							<td class="info-altura"></td>
							<td class="info-gordura"></td>
							<td class="info-imc"></td>
						</tr>
						<tr class="paciente" >
							<td class="info-nome">Paulo</td>
							<td class="info-peso">100</td>
							<td class="info-altura">2.00</td>
							<td class="info-gordura">10</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente" >
							<td class="info-nome">João</td>
							<td class="info-peso">80</td>
							<td class="info-altura">1.72</td>
							<td class="info-gordura">40</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente" >
							<td class="info-nome">Erica</td>
							<td class="info-peso">54</td>
							<td class="info-altura">1.64</td>
							<td class="info-gordura">14</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente">
							<td class="info-nome">Douglas</td>
							<td class="info-peso">85</td>
							<td class="info-altura">1.73</td>
							<td class="info-gordura">24</td>
							<td class="info-imc">0</td>
						</tr>
						<tr class="paciente" >
							<td class="info-nome">Tatiana</td>
							<td class="info-peso">46</td>
							<td class="info-altura">1.55</td>
							<td class="info-gordura">19</td>
							<td class="info-imc">0</td>
						</tr>
					</tbody>
				</table>
				<button id="buscar-pacientes">Buscar Pacientes</button>
				<div class="aux">
					<h2>Adicionar novo paciente</h2>
				</div>
				<form id="form-adiciona" class="campo">
					<div class="campo-medio">
						<div class="grupo" id="erro-msg">
						</div>
						<div class="grupo">
							<label>Nome:</label>
							<input class="nome" type="text" placeholder="Digite seu nome">
						</div>
						<div class="grupo">
							<label>Peso:</label>
							<input class="peso" type="text" placeholder="Digite seu peso">
						</div>
						<div class="grupo">
							<label>Altura:</label>
							<input class="altura" type="text" placeholder="Digite sua altura">
						</div>
						<div class="grupo">
							<label>% de Gordura:</label>
							<input class="gordura" type="text" placeholder="Digite o percentual de gordura">
						</div>
						<button type="submit">Adicionar</button>
					</div>	
				</form>
			</section>
		</main>
		<script src="js/calculoImc.js"></script>
		<script src="js/validacao.js"></script>
		<script src="js/form.js"></script>
		<script src="js/fltrar.js"></script>
		<script src="js/buscarPaciente.js"></script>
		<script src="js/remover.js"></script>
	</body>
</html>
